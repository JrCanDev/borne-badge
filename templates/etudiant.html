{% extends 'layout.html' %}
{% block content %}
<div class="header-action">
    <h2>{{ info.prenom }} {{ info.nom }} - {{ info.groupe_tp }}</h2>
    <a href="{{ url_for('export_etudiant_csv', id_carte=id_carte, date=date_sel, date2=date2_sel) }}" class="btn-export" style="text-decoration: none;">
        Exporter
    </a>
</div>

<div class="filters-container">
    <form method="GET" action="/etudiant/{{ id_carte }}">
        <div class="filter-item">
            <label>Du :</label>
            <input type="date" name="date" value="{{ date_sel }}" onchange="this.form.submit()">
            <label>Au :</label>
            <input type="date" name="date2" value="{{ date2_sel }}" onchange="this.form.submit()">
        </div>
    </form>
</div>

<table class="main-table">
    <thead>
        <tr>
            <th>Jour</th>
            <th>Arrivée</th>
            <th>Départ</th>
        </tr>
    </thead>
    <tbody>
        {% for h in historique %}
        <tr>
            <td>{{ h.jour }}</td>
            <td class="bg-green-light">{{ h.arrivee }}</td>
            <td class="bg-green-light">{{ h.depart }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
