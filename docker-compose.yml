# /apps/blog.silarhi.fr/docker-compose.yml
services:

  database:
    image: mariadb
    container_name: ${NAME}_pg
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: "${MARIADB_DATABASE}"
      MARIADB_USERNAME: "${MARIADB_USERNAME}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD}"
    networks:
      - lan
    volumes:
      - ./mariadb-data:/var/lib/mariadb/data


  app:
    container_name: ${NAME}
    build: 
      context: .
      dockerfile: Dockerfile
    networks:
        - lan
        - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.${NAME}.entryPoints=websecure
      - "traefik.http.services.${NAME}.loadbalancer.server.port=3000"
      - traefik.http.routers.${NAME}.rule=Host(`${NAME}.jrcan.dev`)
      - traefik.http.routers.${NAME}.tls=true
      - traefik.http.routers.${NAME}.tls.certresolver=myresolver

    restart: always
    environment:
      # see https://ghost.org/docs/config/#configuration-options
      container__name: ${NAME}
      database__client: mysql
      database__connection__host: ${NAME}_pg
      database__connection__user: "${MYSQL_USERNAME}"
      database__connection__password: "${MYSQL_PASSWORD}"
      database__connection__database: "${MYSQL_DATABASE}"

networks:
  web:
    external: true
  lan:
    external: false
    name: lan_${NAME}


